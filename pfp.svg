<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0f3a"/>
      <stop offset="100%" stop-color="#02020c"/>
    </radialGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b7fff"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b7fff"/>
    </linearGradient>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circle-clip">
      <circle cx="200" cy="200" r="196"/>
    </clipPath>
  </defs>

  <!-- background -->
  <circle cx="200" cy="200" r="200" fill="#02020c"/>
  <circle cx="200" cy="200" r="200" fill="url(#bg-glow)"/>

  <!-- ambient glow orbs -->
  <ellipse cx="140" cy="160" rx="80" ry="80" fill="#8b7fff" opacity="0.08" clip-path="url(#circle-clip)"/>
  <ellipse cx="270" cy="240" rx="70" ry="70" fill="#22d3ee" opacity="0.07" clip-path="url(#circle-clip)"/>

  <!-- subtle grid lines -->
  <g clip-path="url(#circle-clip)" opacity="0.04" stroke="#8b7fff" stroke-width="1">
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
  </g>

  <!-- gradient ring border -->
  <circle cx="200" cy="200" r="193" fill="none" stroke="url(#ring-grad)" stroke-width="3" opacity="0.9"/>
  <circle cx="200" cy="200" r="189" fill="none" stroke="url(#ring-grad)" stroke-width="1" opacity="0.3"/>

  <!-- wyvern icon — scaled up and centered (original: 48x46, scaled to ~160x153 centered at 200,200) -->
  <g transform="translate(121, 124) scale(3.33)" filter="url(#glow-strong)">
    <path fill="url(#icon-grad)" d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"/>
  </g>

  <!-- corner accent dots -->
  <circle cx="60" cy="60" r="3" fill="#8b7fff" opacity="0.5"/>
  <circle cx="340" cy="60" r="3" fill="#22d3ee" opacity="0.5"/>
  <circle cx="60" cy="340" r="3" fill="#22d3ee" opacity="0.5"/>
  <circle cx="340" cy="340" r="3" fill="#8b7fff" opacity="0.5"/>
</svg>
