<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <linearGradient id="bg-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02020c"/>
      <stop offset="100%" stop-color="#07071a"/>
    </linearGradient>
    <linearGradient id="glow-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b7fff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8b7fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow-right" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bff"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#10d9a0"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b7fff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="icon-glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- base background -->
  <rect width="1500" height="500" fill="url(#bg-base)"/>

  <!-- ambient glow blobs -->
  <ellipse cx="320" cy="250" rx="320" ry="240" fill="url(#glow-left)" filter="url(#blur-glow)"/>
  <ellipse cx="1200" cy="260" rx="300" ry="220" fill="url(#glow-right)" filter="url(#blur-glow)"/>

  <!-- subtle grid -->
  <g opacity="0.035" stroke="#8b7fff" stroke-width="1">
    <!-- horizontal -->
    <line x1="0" y1="100" x2="1500" y2="100"/>
    <line x1="0" y1="200" x2="1500" y2="200"/>
    <line x1="0" y1="300" x2="1500" y2="300"/>
    <line x1="0" y1="400" x2="1500" y2="400"/>
    <!-- vertical -->
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
    <line x1="900" y1="0" x2="900" y2="500"/>
    <line x1="1050" y1="0" x2="1050" y2="500"/>
    <line x1="1200" y1="0" x2="1200" y2="500"/>
    <line x1="1350" y1="0" x2="1350" y2="500"/>
  </g>

  <!-- decorative dots -->
  <circle cx="80" cy="80" r="2.5" fill="#8b7fff" opacity="0.5"/>
  <circle cx="120" cy="80" r="1.5" fill="#8b7fff" opacity="0.3"/>
  <circle cx="80" cy="420" r="2.5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="1420" cy="80" r="2.5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="1380" cy="80" r="1.5" fill="#22d3ee" opacity="0.3"/>
  <circle cx="1420" cy="420" r="2.5" fill="#8b7fff" opacity="0.5"/>

  <!-- left decorative vertical line -->
  <rect x="72" y="120" width="1" height="260" fill="url(#line-grad)" opacity="0.3"/>

  <!-- right decorative vertical line -->
  <rect x="1427" y="120" width="1" height="260" fill="url(#line-grad)" opacity="0.3"/>

  <!-- wyvern icon — placed left-center, large -->
  <g transform="translate(160, 135) scale(4.8)" filter="url(#icon-glow)">
    <path fill="url(#icon-grad)" d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"/>
  </g>

  <!-- divider line between icon and text -->
  <rect x="420" y="150" width="1.5" height="200" fill="rgba(139,127,255,0.25)" rx="1"/>

  <!-- main title -->
  <text x="468" y="255"
    font-family="'Syne', 'Arial Black', sans-serif"
    font-size="88"
    font-weight="800"
    letter-spacing="-3"
    fill="url(#title-grad)"
    filter="url(#text-glow)">WYVERN</text>

  <!-- subtitle -->
  <text x="470" y="308"
    font-family="'DM Mono', 'Courier New', monospace"
    font-size="22"
    font-weight="400"
    letter-spacing="8"
    fill="rgba(240,239,255,0.45)">PROTOCOL</text>

  <!-- accent line under title -->
  <rect x="468" y="322" width="340" height="2" fill="url(#line-grad)" rx="1" opacity="0.6"/>

  <!-- tagline -->
  <text x="468" y="368"
    font-family="'DM Sans', Arial, sans-serif"
    font-size="16"
    fill="rgba(240,239,255,0.35)"
    letter-spacing="1">Tokenized assets · Atomic settlement · Solana</text>

  <!-- live badge -->
  <g transform="translate(468, 390)">
    <rect x="0" y="0" width="80" height="24" rx="12" fill="rgba(16,217,160,0.1)" stroke="rgba(16,217,160,0.35)" stroke-width="1"/>
    <circle cx="16" cy="12" r="4" fill="#10d9a0"/>
    <text x="28" y="16.5"
      font-family="'DM Mono', monospace"
      font-size="10"
      letter-spacing="1.5"
      fill="#10d9a0">LIVE</text>
  </g>

  <!-- right side: floating stat cards -->
  <g transform="translate(1020, 130)">
    <!-- card 1: ASSETS -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="200" height="72" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(139,127,255,0.15)" stroke-width="1"/>
      <text x="16" y="24" font-family="monospace" font-size="9" letter-spacing="2" fill="rgba(240,239,255,0.35)">ASSETS</text>
      <text x="16" y="55" font-family="'Syne', sans-serif" font-size="28" font-weight="800" fill="#a78bff">33+</text>
    </g>

    <!-- card 2: SETTLEMENT -->
    <g transform="translate(220, 0)">
      <rect x="0" y="0" width="200" height="72" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
      <text x="16" y="24" font-family="monospace" font-size="9" letter-spacing="2" fill="rgba(240,239,255,0.35)">SETTLEMENT</text>
      <text x="16" y="55" font-family="'Syne', sans-serif" font-size="28" font-weight="800" fill="#22d3ee">400ms</text>
    </g>

    <!-- card 3: NETWORK -->
    <g transform="translate(0, 96)">
      <rect x="0" y="0" width="200" height="72" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(16,217,160,0.15)" stroke-width="1"/>
      <text x="16" y="24" font-family="monospace" font-size="9" letter-spacing="2" fill="rgba(240,239,255,0.35)">NETWORK</text>
      <text x="16" y="55" font-family="'Syne', sans-serif" font-size="28" font-weight="800" fill="#10d9a0">Solana</text>
    </g>

    <!-- card 4: FEES -->
    <g transform="translate(220, 96)">
      <rect x="0" y="0" width="200" height="72" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(139,127,255,0.15)" stroke-width="1"/>
      <text x="16" y="24" font-family="monospace" font-size="9" letter-spacing="2" fill="rgba(240,239,255,0.35)">FEES</text>
      <text x="16" y="55" font-family="'Syne', sans-serif" font-size="28" font-weight="800" fill="#a78bff">&lt;$0.01</text>
    </g>

    <!-- card 5: TOKEN wide -->
    <g transform="translate(0, 192)">
      <rect x="0" y="0" width="420" height="56" rx="10" fill="rgba(255,255,255,0.025)" stroke="rgba(139,127,255,0.1)" stroke-width="1"/>
      <text x="16" y="20" font-family="monospace" font-size="9" letter-spacing="2" fill="rgba(240,239,255,0.35)">TOKEN</text>
      <text x="16" y="42" font-family="'DM Mono', monospace" font-size="16" font-weight="500" fill="rgba(240,239,255,0.6)">$WYV · Coming Soon</text>
    </g>
  </g>

  <!-- bottom border gradient line -->
  <rect x="0" y="497" width="1500" height="3" fill="url(#line-grad)" opacity="0.4" rx="1"/>
</svg>
